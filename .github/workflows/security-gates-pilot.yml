name: Security Gates Pilot

# Non-required pilot for Sharper Flow reusable security gates. Use this to
# measure false positives, suppressions, runtime, and failure modes before
# considering required branch protection.
#
# Non-blocking semantics come from NOT being in branch protection's required
# checks list — failures are visible signals, not merge blockers. Do not add
# `continue-on-error: true` to the reusable-workflow job: GitHub rejects it as
# invalid syntax for `uses:` jobs and the entire workflow refuses to start.
on:
  workflow_dispatch:
  pull_request:
    branches: [trunk]
  push:
    branches: [trunk]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  security-gates:
    name: Security gates pilot
    # SHA pinning doesn't work cross-repo with private repos + GITHUB_TOKEN scope;
    # use @main until the reusable workflow is stable enough for branch protection.
    uses: Sharper-Flow/sharperflow-security-gates/.github/workflows/javascript-security-gate.yml@6a15da3b7eae6b6146deb72472d29b58f5c5c1c1 # v0
    permissions:
      contents: read
    with:
      scan-paths: "plugin/src plugin/scripts"
      lockfile-path: "plugin/pnpm-lock.yaml"
      semgrep-configs: "p/javascript p/typescript"
      semgrep-excludes: "node_modules dist coverage .adv temp test-results"
      run-trivy-fs: true
