name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, trunk]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          echo "Commits since ${LAST_TAG}:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false
          HAS_OTHER=false

          while IFS= read -r line; do
            if echo "$line" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              HAS_BREAKING=true
            fi
            if echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              HAS_FEAT=true
            fi
            if echo "$line" | grep -qE '^fix(\(.+\))?:'; then
              HAS_FIX=true
            fi
            if echo "$line" | grep -qE '^[a-z]+(\(.+\))?:'; then
              HAS_OTHER=true
            fi
          done <<< "$COMMITS"

          CURRENT="${LAST_TAG#v}"
          CURRENT="${CURRENT%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$HAS_BREAKING" = true ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP="major"
          elif [ "$HAS_FEAT" = true ]; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP="minor"
          elif [ "$HAS_FIX" = true ] || [ "$HAS_OTHER" = true ]; then
            PATCH=$((PATCH + 1)); BUMP="patch"
          else
            echo "No conventional commits found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP ($LAST_TAG → $NEW_TAG)"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          FEAT_ENTRIES=""
          FIX_ENTRIES=""
          OTHER_ENTRIES=""

          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")

          # Collect executive-summary highlights from archived ADV changes
          HIGHLIGHTS=""
          ARCHIVE_FILES=$(git diff --name-only "${LAST_TAG}..HEAD" -- '.adv/archive/*/executive-summary.md' 2>/dev/null || true)
          if [ -n "$ARCHIVE_FILES" ]; then
            while IFS= read -r archive_file; do
              BUNDLE_NAME=$(dirname "$archive_file" | xargs basename)
              CHANGE_TITLE=$(echo "$BUNDLE_NAME" | sed -E 's/^[0-9]+-//')
              CONTENT=$(git show "HEAD:$archive_file" 2>/dev/null | head -20 || true)
              if [ -n "$CONTENT" ]; then
                HIGHLIGHTS="${HIGHLIGHTS}
          - **${CHANGE_TITLE}**: $(echo "$CONTENT" | head -1 | sed 's/^#* *//')"
              fi
            done <<< "$ARCHIVE_FILES"
          fi

          while IFS= read -r line; do
            MSG=$(echo "$line" | sed -E 's/^[a-z]+(\(.+\))?:\s*//')
            if echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              FEAT_ENTRIES="${FEAT_ENTRIES}
          - ${MSG}"
            elif echo "$line" | grep -qE '^fix(\(.+\))?:'; then
              FIX_ENTRIES="${FIX_ENTRIES}
          - ${MSG}"
            elif echo "$line" | grep -qE '^(chore|ci|docs|refactor|test|perf|style|build)(\(.+\))?:'; then
              SCOPE=$(echo "$line" | sed -E 's/^([a-z]+)(\((.+)\))?:.*/\3/' | head -1)
              PREFIX=$(echo "$line" | sed -E 's/^([a-z]+)(\(.+\))?:.*/\1/')
              if [ -n "$SCOPE" ] && [ "$SCOPE" != "$PREFIX" ]; then
                OTHER_ENTRIES="${OTHER_ENTRIES}
          - ${MSG} (${PREFIX}: ${SCOPE})"
              else
                OTHER_ENTRIES="${OTHER_ENTRIES}
          - ${MSG} (${PREFIX})"
              fi
            fi
          done <<< "$COMMITS"

          BODY=""
          [ -n "$FEAT_ENTRIES" ] && BODY="${BODY}
          ### Added
          ${FEAT_ENTRIES}
          "
          [ -n "$FIX_ENTRIES" ] && BODY="${BODY}
          ### Fixed
          ${FIX_ENTRIES}
          "
          [ -n "$OTHER_ENTRIES" ] && BODY="${BODY}
          ### Changed
          ${OTHER_ENTRIES}
          "
          [ -n "$HIGHLIGHTS" ] && BODY="${BODY}
          ### Change Highlights
          ${HIGHLIGHTS}
          "

          {
            echo "body<<NOTES_EOF"
            echo "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          # Tags only — CHANGELOG.md updates land via normal PRs (avoids
          # bypassing branch protection's required status checks on trunk).
          git push origin "$NEW_TAG"

      - name: Setup Node.js
        if: steps.bump.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install pnpm
        if: steps.bump.outputs.skip != 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11

      - name: Install dependencies
        if: steps.bump.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile
        working-directory: plugin

      - name: Build plugin
        if: steps.bump.outputs.skip != 'true'
        run: pnpm run build
        working-directory: plugin

      - name: Create release archive
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.bump.outputs.new_tag }}"
          ARCHIVE_ROOT="advance-${VERSION}"
          ARCHIVE="advance-${VERSION}.tar.gz"
          rm -rf dist
          mkdir -p dist
          tar -czf "dist/${ARCHIVE}" \
            --transform "s,^,${ARCHIVE_ROOT}/," \
            README.md \
            SETUP.md \
            ADV_INSTRUCTIONS.md \
            AGENTS.md \
            project.md \
            project.json \
            install.sh \
            bin \
            scripts \
            .opencode/command \
            .opencode/agents \
            .opencode/overlays \
            skills \
            plugin/dist \
            plugin/src \
            plugin/package.json \
            plugin/pnpm-lock.yaml \
            plugin/tsconfig.json \
            plugin/tsup.config.ts \
            plugin/vitest.config.ts
          tar -tzf "dist/${ARCHIVE}" > "dist/${ARCHIVE}.contents.txt"
          for required in \
            "${ARCHIVE_ROOT}/plugin/dist/index.js" \
            "${ARCHIVE_ROOT}/plugin/src/index.ts" \
            "${ARCHIVE_ROOT}/plugin/package.json" \
            "${ARCHIVE_ROOT}/plugin/pnpm-lock.yaml" \
            "${ARCHIVE_ROOT}/scripts/deploy-local.sh" \
            "${ARCHIVE_ROOT}/bin/adv" \
            "${ARCHIVE_ROOT}/bin/lib/live-status.ts" \
            "${ARCHIVE_ROOT}/install.sh" \
            "${ARCHIVE_ROOT}/.opencode/command/" \
            "${ARCHIVE_ROOT}/.opencode/agents/" \
            "${ARCHIVE_ROOT}/.opencode/overlays/" \
            "${ARCHIVE_ROOT}/skills/" \
            "${ARCHIVE_ROOT}/README.md" \
            "${ARCHIVE_ROOT}/SETUP.md" \
            "${ARCHIVE_ROOT}/ADV_INSTRUCTIONS.md" \
            "${ARCHIVE_ROOT}/AGENTS.md" \
            "${ARCHIVE_ROOT}/project.md" \
            "${ARCHIVE_ROOT}/project.json"
          do
            grep -qxF "$required" "dist/${ARCHIVE}.contents.txt"
          done
          cp install.sh dist/install.sh
          (cd dist && sha256sum "${ARCHIVE}" install.sh > SHA256SUMS.txt)

      - name: Create Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          files: |
            dist/*.tar.gz
            dist/install.sh
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: ${{ steps.notes.outputs.body }}

      - name: Summary
        if: steps.bump.outputs.skip != 'true'
        run: |
          echo "## Auto Release 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.bump.outputs.new_tag }}** (${{ steps.bump.outputs.bump }} from ${{ steps.last_tag.outputs.tag }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip summary
        if: steps.bump.outputs.skip == 'true'
        run: echo "## No Release Needed" >> "$GITHUB_STEP_SUMMARY"
