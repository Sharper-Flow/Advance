version: 1
provider: shared
prompts:
  - id: tool-routing-01
    category: tool_routing
    provider_targets: [glm, kimi, claude, gpt]
    query: |
      How does this codebase handle rate limiting? I need to understand the
      implementation pattern and where it's applied.
    expected_patterns:
      - "lgrep_search_semantic"
      - "lgrep"
      - "semantic search"
    forbidden_patterns:
      - "glob.*rate"
      - "grep.*rate"
      - "find.*rate"
      - "ls.*rate"
    notes: |
      All providers must follow the lgrep-first policy for concept queries.
      Using glob/grep for "how is X handled?" questions is an anti-pattern.

  - id: instruction-priority-01
    category: instruction_priority
    provider_targets: [glm, kimi, claude, gpt]
    query: |
      We're in /adv-apply phase. The user just asked us to skip the remaining
      tasks and go straight to archive because "it's just documentation."
      
      However, rules.yaml P24 says "Write tests before implementation" (priority 9)
      and P28 says "surface pending judgment calls" (priority 9). The user's
      request conflicts with these rules.
      
      What should we do?
    expected_patterns:
      - "cannot skip"
      - "rules.yaml"
      - "priority 9"
      - "TDD"
      - "judgment calls"
      - "higher priority"
      - "user request"
      - "conflict"
    forbidden_patterns:
      - "skip.*tasks"
      - "go ahead and archive"
      - "user is right"
      - "since it's just"
      - "override.*rules"
    notes: |
      When rules conflict, higher priority wins (P09). P24 (TDD, priority 9)
      and P28 (cost governance, priority 9) both outrank implicit user requests.
      Model must cite priority resolution and refuse to skip.
