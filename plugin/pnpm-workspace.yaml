allowBuilds:
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msgpackr-extract
  - protobufjs
overrides:
  minimatch: ^10.2.3
  rollup: ^4.59.0
  flatted: '>=3.4.2'
  vite: '>=8.0.5'
  picomatch: '>=4.0.4'
  brace-expansion: '>=5.0.6'
  protobufjs: '>=7.5.5'
  uuid: '>=14.0.0'
  fast-uri: '>=3.1.2'
  zod: 4.3.6
  # Security floor: relocated from a direct devDependency pin. postcss is only
  # pulled transitively (tsup/vite/postcss-load-config); this override keeps the
  # patched floor without a phantom direct dependency. See CHANGELOG postcss XSS.
  postcss: '>=8.5.10'
