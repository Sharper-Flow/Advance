name: CI

on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: [main, trunk]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: plugin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: plugin

      - name: Schema drift check
        run: pnpm run schemas:check
        working-directory: plugin

      - name: Type check
        run: pnpm run typecheck
        working-directory: plugin

      - name: Lint
        run: pnpm run lint
        working-directory: plugin

      - name: Format check
        run: pnpm run format:check
        working-directory: plugin

      - name: Configure git identity for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test.local"

      - name: Build worker bundle for OOP integration tests
        run: pnpm run build:worker
        working-directory: plugin

      - name: Install Temporal CLI
        uses: temporalio/setup-temporal@1059a504f87e7fa2f385e3fa40d1aa7e62f1c6ca # v0

      - name: Install Bun
        # opencode-session-debt.test.ts shells out to `bun` to seed a bun:sqlite
        # database under the OpenCode debt-doctor scenario. Without bun on PATH
        # the test fails with `spawnSync bun ENOENT`. Bun is OpenCode's runtime;
        # keeping it on the CI runner mirrors the production environment.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Test
        run: pnpm test
        working-directory: plugin

      - name: Test bin CLI (Bun)
        run: bun test bin/
        working-directory: .

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: "pnpm"
          cache-dependency-path: plugin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: plugin

      - name: Build
        run: pnpm run build
        working-directory: plugin
